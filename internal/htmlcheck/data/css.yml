    '9': Supported in version 2022-12. Not supported in version 2020-01.
    '10': Supported in version 2023-03. Not supported in versions 2020-01, 2022-12.
    '11': Supported in version 68.4. Not supported in versions 60.8, 78.5, 91.13.
    '12': Supported in version 2020-06. Not supported in version 2022-12.
    '13': Supported in version 2022-12. Not supported in version 2021-07.
