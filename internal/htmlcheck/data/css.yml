      `revert` are not supported. Affected versions AOL Desktop Webmail 2021-12, AOL
      iOS 2021-12, AOL Android 2021-12, Yahoo! Mail Desktop Webmail 2021-12, Yahoo!
      Mail iOS 2021-12, and Yahoo! Mail Android 2021-12.
