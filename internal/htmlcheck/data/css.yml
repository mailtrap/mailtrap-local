      Outlook Windows 2007, 2010, 2013, 2016, 2019, and Outlook Windows Mail 2021-12.
    '5': Partial. Only supports `display:none` (but not on `<img>`). Affected versions
      Outlook Windows 2007, 2010, 2013, 2016, 2019, and Outlook Windows Mail 2021-12.
