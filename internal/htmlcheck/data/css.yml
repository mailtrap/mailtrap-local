      Orange Desktop Webmail 2019-05, SFR Desktop Webmail 2019-07, and LaPoste.net
      Desktop Webmail 2021-08.
    '3': Buggy. Support depends on the version of IE installed. Affected version Outlook
      Windows 2003.
    '4': Partial. The declaration is supported but distant fonts are ignored. Affected
      versions Outlook Windows 2007, 2010, 2013, 2016, and 2019.
    '5': Buggy. Elements using a font declared with `@font-face` ignore the font stack
      and fall back to Times New Roman. Use `mso-generic-font-family` and `mso-font-alt`
      to control the fallback. Affected versions Outlook Windows 2007, 2010, 2013,
      and 2016.
    '6': Not supported. Roboto and Google Sans can be used, but only because they're
      embedded with the webmail's own styles. Affected version Gmail Desktop Webmail
      2019-07.
    '7': Not supported. The `@font-face` declaration is kept but the `src` property
      is removed. Affected version Orange Desktop Webmail 2021-03.
    '8': Not supported when using a Microsoft email address; outlook, live, hotmail,
      etc.. Affected versions Samsung Email Android 6.0 and 2021-11.
    '9': Supported in version 2.51.1. Not supported in version 3.29.0.
