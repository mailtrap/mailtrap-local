      Outlook.com 2022-02, Outlook iOS 2022-02, Outlook Android 2022-02, Samsung Email
      Android 6.0, ProtonMail iOS 2022-02, and ProtonMail Android 2022-02.
    '3': Partially supported. Only `word-break:break-all` works. Affected version
      Orange Desktop Webmail 2022-02.
    '4': Buggy. Every value is replaced by `break-word`. Affected version HEY Desktop
      Webmail 2022-02.
