      so no video can play. Affected version Orange iOS 2019-09.
    '2': "`<video>`, `<source>` and `<track>` tags are replaced by `<u></u>` tags.
      Affected versions Gmail Desktop Webmail 2019-09, Gmail iOS 2019-09, Gmail Android
      2019-09, and Gmail Mobile Webmail 2020-02."
    '3': Buggy. Support depends on the version of Internet Explorer installed. Affected
      version Outlook Windows 2003.
    '4': "`<video>`, `<source>` and `<track>` tags are stripped. The fallback content
      is shown instead. Affected versions Outlook Outlook.com 2019-09, Outlook iOS
      2019-09, Outlook Android 2019-09, AOL Desktop Webmail 2019-09, AOL iOS 2019-09,
      AOL Android 2019-09, Yahoo! Mail Desktop Webmail 2019-09, Yahoo! Mail iOS 2019-09,
      and Yahoo! Mail Android 2019-09."
    '5': Partial support. Requires the `controls` attribute to play. Affected versions
      Apple Mail iOS 12.4, 13.3, Samsung Email Android 6.0, GMX iOS 2022-11, and web-de
      iOS 2022-11.
    '6': Partial support. `autoplay` is not supported. Affected versions Apple Mail
      iOS 13.3, GMX iOS 2022-11, and web-de iOS 2022-11.
    '7': The `<video>` element is supported and the `poster` image is visible, but
      the video can not play due to a strict Content Security Policy. Affected version
      ProtonMail Desktop Webmail 2020-03.
    '8': The `<video>` element is supported, but the video can not play due to a strict
      Content Security Policy. Affected versions Outlook Outlook.com 2021-05, Outlook
      iOS 2021-05, and Outlook Android 2021-05.
    '9': Not supported. The `<video>` element and all its content is removed. Affected
      versions Fastmail Desktop Webmail 2021-07 and ionos-1and1 Desktop Webmail 2022-11.
    '10': Not supported. The `src` attribute is replaced by `data-src`. Affected version
      LaPoste.net Desktop Webmail 2021-08.
    '11': Supported in version 2019-09. Not supported in version 2021-03.
    '12': Supported in version 2003. Not supported in versions 2007, 2010, 2013, 2016,
      2019.
